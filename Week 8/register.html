<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title>

    <link rel="stylesheet" href="./css/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="./css/style.css">

    <script src="./js/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="./js/menu.js"></script>
</head>

<body class="bg-light">
    <div id="menuNavbar"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card p-3 h-100 rounded-4 card-anime">
                    <div class="card-body text-center">
                        <p class="m-0 fs-2">สมัครสมาชิก</p>
                        <p class="m-0 fs-6 text-muted">
                            กรุณากรอกข้อมูลของคุณ
                        </p>
                        <div class="d-flex flex-column gap-2 mt-3 text-start">
                            <div class="d-flex flex-row">
                                <div class="me-2">
                                    <label for="firstname">ชื่อจริง</label>
                                    <input type="text" class="form-control" placeholder="ชื่อจริง">
                                </div>
                                <div class="ms-2">
                                    <label for="lastname">นามสกุล</label>
                                    <input type="text" class="form-control" placeholder="นามสกุล">
                                </div>
                            </div>
                            <label for="username">ชื่อผู้ใช้</label>
                            <input type="text" class="form-control" placeholder="ชื่อผู้ใช้">
                            <label for="password">รหัสผ่าน</label>
                            <input type="password" class="form-control" placeholder="รหัสผ่าน">
                            <label for="repassword">ยืนยันรหัสผ่าน</label>
                            <input type="password" class="form-control" placeholder="ยืนยันรหัสผ่าน">
                        </div>
                        <hr class="my-3">
                        <button class="btn btn-primary w-100">สมัครสมาชิก</button>
                        <p class="m-0 fs-6 text-muted mt-3">
                            มีบัญชีแล้ว? <a href="./login.html">เข้าสู่ระบบ</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
