<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Go2upSkills | Register</title>

    <link rel="stylesheet" href="./css/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="./css/style.css">

    <script src="./js/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="./js/menu.js"></script>
</head>

<body class="bg-light">
    <div id="menuNavbar"></div>

    <div class="container py-5">

        <div class="d-flex flex-row align-items-center justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex flex-column">
                            <div class="d-flex flex-row align-items-center justify-content-center gap-3">
                                <div class="d-flex flex-row align-items-center justify-content-center rounded-circle overflow-hidden"
                                    style="max-height: 75px; aspect-ratio: 1/1;">
                                    <img src="./image/logo.png" alt="" class="w-100">
                                </div>
                                <p class="fs-5 m-0 fw-medium">
                                    Go2upSkills
                                </p>
                            </div>
                            <hr class="my-2">
                            <p class="m-0 fs-5 fw-medium text-center">
                                Register
                            </p>
                            <p class="m-0 fs-6 text-center">
                                Create your new account
                            </p>
                            <div class="py-2"></div>
                            <div class="d-flex flex-column gap-2">
                                <div class="">
                                    <label for="" class="form-label">Course</label>
                                    <select class="form-select">
                                        <option value="none" selected disabled>Please select your course</option>
                                        <option value="c1">Course 1</option>
                                        <option value="c2">Course 2</option>
                                        <option value="c3">Course 3</option>
                                        <option value="c4">Course 4</option>
                                        <option value="c5">Course 5</option>
                                        <option value="c6">Course 6</option>
                                    </select>
                                </div>
                                <div class="d-flex flex-row gap-2">
                                    <div class="">
                                        <label for="" class="form-label">First name</label>
                                        <input type="text" class="form-control" placeholder="First name">
                                    </div>
                                    <div class="">
                                        <label for="" class="form-label">Last name</label>
                                        <input type="text" class="form-control" placeholder="Last name">
                                    </div>
                                </div>
                                <div class="d-flex flex-row gap-2">
                                    <div class="">
                                        <label for="" class="form-label">Email</label>
                                        <input type="email" class="form-control" placeholder="Email">
                                    </div>
                                    <div class="">
                                        <label for="" class="form-label">Phone number</label>
                                        <input type="tel" class="form-control" placeholder="Phone number">
                                    </div>
                                </div>
                                <div class="">
                                    <label for="" class="form-label">Username</label>
                                    <input type="text" class="form-control" placeholder="Username">
                                </div>
                                <div class="">
                                    <label for="" class="form-label">Password</label>
                                    <input type="text" class="form-control" placeholder="Password">
                                </div>
                                <div class="">
                                    <label for="" class="form-label">Confirm password</label>
                                    <input type="text" class="form-control" placeholder="Confirm password">
                                </div>
                            </div>
                            <hr class="my-3">
                            <button class="btn btn-success w-100">
                                Register
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>

</html>
